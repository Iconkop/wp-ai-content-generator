name: Build & Full Repo Zip Release

# 仅手动触发，支持输入版本号
on:
  workflow_dispatch:
    inputs:
      version:
        description: '输入版本号（例如 v1.0.0）'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full repo code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 缓存 npm 依赖
      - name: Cache npm deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ runner.os }}-node20-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node20-

      # 安装依赖 + 构建
      - name: Install & Build
        run: |
          npm ci
          npm run build

      # 安装 zip
      - name: Install zip
        run: sudo apt install -y zip

      # 打包，使用手动输入的版本号
      - name: Pack zip with input version
        shell: bash
        run: |
          TAG=${{ github.event.inputs.version }}
          ZIP_NAME="wp-ai-content-generator-${TAG}.zip"

          rm -rf wp-ai-content-generator
          mkdir -p wp-ai-content-generator

          shopt -s dotglob
          for file in *; do
            [[ $file == "wp-ai-content-generator" ]] && continue
            [[ $file == ".git" ]] && continue
            [[ $file == ".github" ]] && continue
            cp -r "$file" wp-ai-content-generator/
          done

          zip -r "${ZIP_NAME}" wp-ai-content-generator \
            -x "*/node_modules/*"

      # 发布 Release
      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: wp-ai-content-generator-*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
