name: Build & Full Repo Zip Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full repo code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 标准官方 npm 缓存，不换源、不瞎改配置
      - name: Cache npm deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ runner.os }}-node20-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node20-

      # 纯官方源，npm ci 精准安装
      - name: Install & Build
        run: |
          npm ci
          npm run build

      - name: Install zip
        run: sudo apt install -y zip

      - name: Pack zip with version & correct root dir
        shell: bash
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          ZIP_NAME="wp-ai-content-generator-${TAG}.zip"

          rm -rf wp-ai-content-generator
          mkdir wp-ai-content-generator

          shopt -s dotglob
          for file in *; do
            [[ $file == "wp-ai-content-generator" ]] && continue
            cp -r "$file" wp-ai-content-generator/
          done

          zip -r "${ZIP_NAME}" wp-ai-content-generator \
            -x "*/.git/*" \
            -x "*/.github/*" \
            -x "*/node_modules/*"

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: wp-ai-content-generator-*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
